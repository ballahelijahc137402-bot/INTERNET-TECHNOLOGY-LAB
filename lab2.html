<!-- 
Create a web page with appropriate content and insert an image
    towards the left hand side of the page. When user clicks on the image, it
    should open another web page.
-->

<!doctype html>
<html>
  <head>
    <title>My Webpage</title>
    <style>
      body {
        background-color: #f0f0f0;
        font-family: Arial, sans-serif;
      }
      h1 {
        text-align: center;
        color: darkgreen;
      }
      .left-image {
        float: left;
        margin: 20px;
        border: 3px solid green;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Welcome to My Website</h1>

    <a href="https://www.google.com" target="_blank">
      <img
        class="left-image"
        src="https://via.placeholder.com/200"
        width="200"
        height="150"
        alt="Click Me"
      />
    </a>

    <p>This is my webpage with an image on the left.</p>
    <p>Click the image to open a new webpage!</p>
  </body>
</html>
