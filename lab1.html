 Write html code to insert background to the webpage
-->

<!doctype html>
<html>
  <head>
    <title>Background Example</title>
    <style>
      body {
        background-color: lightblue;
      }
    </style>
  </head>
  <body>
    <h1>Welcome to My Webpage!</h1>
    <p>This page has a background color applied.</p>
  </body>
</html>
